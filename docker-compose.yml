version: "3.9"

services:
  postgres:
    image: postgres:17-alpine
    container_name: coffee-chain-postgres
    environment:
      POSTGRES_DB: coffee_chain_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: coffee-chain-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__PostgreSql: Host=postgres;Port=5432;Database=coffee_chain_management;Username=postgres;Password=postgres
      Frontend__Url: http://localhost:4200
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: coffee-chain-admin
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres-data:
