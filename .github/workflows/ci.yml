name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore CoffeeChainManagement.slnx

      - name: Test
        run: dotnet test CoffeeChainManagement.slnx --no-restore

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend/coffee-chain-admin
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/frontend/coffee-chain-admin/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
