<div class="recipes-container">
  <div class="page-header">
    <div class="header-content">
      <a routerLink="/products" class="back-link">← Quay lại danh sách Sản phẩm</a>
      <h1>Thiết lập công thức</h1>
      <p class="subtitle">Sản phẩm: <strong>{{ productName() }}</strong></p>
    </div>
    <div class="header-actions">
      <button class="btn btn-primary" [disabled]="loading() || submitting()" (click)="save()">
        <span class="icon">💾</span> Lưu công thức
      </button>
    </div>
  </div>

  <div *ngIf="error()" class="alert alert-error">{{ error() }}</div>
  <div *ngIf="success()" class="alert alert-success">{{ success() }}</div>

  <div *ngIf="loading()" class="loading-state">
    <div class="spinner"></div>
    <p>Đang tải dữ liệu...</p>
  </div>

  <div *ngIf="!loading()" class="recipe-content">
    <div class="card form-card">
      <div class="form-group">
        <label>Hướng dẫn pha chế</label>
        <textarea 
          class="form-control" 
          rows="4" 
          [ngModel]="instructions()" 
          (ngModelChange)="instructions.set($event)"
          placeholder="Nhập hướng dẫn pha chế chi tiết (tùy chọn)"></textarea>
      </div>

      <div class="ingredients-section">
        <div class="section-header">
          <h3>Định mức nguyên liệu</h3>
          <button class="btn btn-secondary btn-sm" (click)="addIngredient()">
            + Thêm nguyên liệu
          </button>
        </div>

        <p *ngIf="ingredients().length === 0" class="empty-state text-muted">Chưa có nguyên liệu nào. Vui lòng thêm nguyên liệu.</p>

        <div class="ingredient-list">
          <div class="ingredient-row" *ngFor="let item of ingredients(); let i = index">
            <div class="form-group flex-1">
              <label>Nguyên liệu</label>
              <select class="form-control" [ngModel]="item.ingredientId" (ngModelChange)="item.ingredientId = $event">
                <option value="">-- Chọn nguyên liệu --</option>
                <option *ngFor="let lookup of lookupIngredients()" [value]="lookup.id">
                  {{ lookup.label }}
                </option>
              </select>
            </div>
            
            <div class="form-group quantity-input">
              <label>Số lượng (đơn vị)</label>
              <input type="number" class="form-control" min="1" [ngModel]="item.requiredQuantity" (ngModelChange)="item.requiredQuantity = $event">
            </div>

            <button class="btn btn-danger btn-icon" title="Xóa nguyên liệu" (click)="removeIngredient(i)">
              ✖
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
