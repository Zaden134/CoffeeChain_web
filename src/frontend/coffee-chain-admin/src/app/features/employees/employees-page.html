<section class="page-card">
  <div class="page-head">
    <div>
      <h2>Nhan vien</h2>
      <p>Trang quan ly nhan su va role, de san cho API CRUD sau nay.</p>
    </div>
  </div>

  <div class="employee-list">
    @for (employee of employees; track employee.name) {
      <article class="employee-card">
        <div class="avatar">{{ employee.name.slice(0, 1) }}</div>
        <div class="copy">
          <strong>{{ employee.name }}</strong>
          <p>{{ employee.role }} · {{ employee.branch }}</p>
        </div>
        <span class="status" [class.pending]="employee.status !== 'Active'">{{ employee.status }}</span>
      </article>
    }
  </div>
</section>
