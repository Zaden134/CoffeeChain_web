<section class="page-card">
  <div class="page-head">
    <div>
      <h2>Bao cao</h2>
      <p>Khung bao cao tong hop theo bo cuc giao dien mau.</p>
    </div>
  </div>

  <div class="grid">
    @for (card of reportCards; track card.label) {
      <article class="stat-card">
        <span>{{ card.label }}</span>
        <strong>
          @if (card.kind === 'currency') {
            {{ card.value | currency:'VND':'symbol':'1.0-0' }}
          } @else {
            {{ card.value | percent:'1.0-1' }}
          }
        </strong>
      </article>
    }
  </div>
</section>
